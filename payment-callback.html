<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status | CampusDash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-12 text-center">
        <div class="bg-white rounded-2xl shadow-md p-8 max-w-md mx-auto">
            <i class="fas fa-spinner fa-spin text-4xl text-green-600 mb-4"></i>
            <h1 class="text-2xl font-bold mb-2">Processing payment...</h1>
            <p class="text-gray-600 mb-4">Please wait while we confirm your payment.</p>
            <p class="text-sm text-gray-500">You will be redirected automatically.</p>
        </div>
    </div>
    <script>
        // We can check with backend if payment was successful, or just redirect to a success page.
        // For simplicity, redirect to index after 3 seconds.
        setTimeout(() => {
            window.location.href = '/index.html?payment=success';
        }, 3000);
    </script>
</body>
</html>

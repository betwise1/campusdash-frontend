<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rider Login | CampusDash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-cyan-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
        <div class="text-center mb-6">
            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-motorcycle text-blue-600 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Rider Portal</h1>
            <p class="text-gray-500 text-sm mt-1">Login to accept deliveries and track earnings</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">+233</span>
                    <input type="tel" id="phone" placeholder="24XXXXXXX" 
                        class="w-full border border-gray-200 rounded-lg pl-16 pr-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">PIN Code</label>
                <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4"
                    class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div id="error-message" class="mt-4 text-center text-red-500 text-sm hidden"></div>

        <div class="mt-6 pt-4 border-t text-center">
            <p class="text-xs text-gray-400 mb-2">Demo Riders:</p>
            <div class="grid grid-cols-2 gap-2 text-xs">
                <div class="bg-gray-50 p-2 rounded">
                    <div class="font-medium">John Mensah</div>
                    <div class="text-gray-500">0244444444 / 4444</div>
                </div>
                <div class="bg-gray-50 p-2 rounded">
                    <div class="font-medium">Ama Serwaa</div>
                    <div class="text-gray-500">0245555555 / 5555</div>
                </div>
                <div class="bg-gray-50 p-2 rounded">
                    <div class="font-medium">Kofi Ansah</div>
                    <div class="text-gray-500">0246666666 / 6666</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://campusdash-backend.onrender.com';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let phone = document.getElementById('phone').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const errorDiv = document.getElementById('error-message');

            if (phone && !phone.startsWith('0') && phone.length === 9) {
                phone = '0' + phone;
            }

            if (!phone || !pin) {
                errorDiv.textContent = 'Please enter phone number and PIN';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (pin.length !== 4) {
                errorDiv.textContent = 'PIN must be 4 digits';
                errorDiv.classList.remove('hidden');
                return;
            }

            errorDiv.classList.add('hidden');
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            submitBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/riders/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, pin })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('riderId', data.rider.id);
                    localStorage.setItem('riderName', data.rider.name);
                    localStorage.setItem('riderPhone', data.rider.phone);
                    window.location.href = `rider.html?rider=${data.rider.id}`;
                } else {
                    errorDiv.textContent = data.error || 'Invalid credentials';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

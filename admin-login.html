<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Login | CampusDash</title>

    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    

    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');*{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-purple-100 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-r from-purple-600 to-indigo-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i class="fas fa-shield-alt text-white text-3xl"></i></div>
            <h1 class="text-2xl font-bold text-gray-800">Admin Portal</h1>
            <p class="text-gray-500 text-sm mt-1">Login to manage payouts</p>
        </div>
        <div id="error-message" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm"></div>
        <form id="login-form" class="space-y-5">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="email" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500" placeholder="admin@campusdash.com"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" id="password" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500" placeholder="Enter password"></div>
            <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-semibold py-3 rounded-lg transition">Login</button>
        </form>
        <div class="mt-6 pt-4 border-t text-center"><p class="text-xs text-gray-400">Demo: admin@campusdash.com / Admin@123</p></div>
    </div>

    <script>
        const API_BASE = 'https://campusdash-backend.onrender.com';
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            errorDiv.classList.add('hidden');
            if (!email || !password) { errorDiv.textContent = 'Please enter email and password'; errorDiv.classList.remove('hidden'); return; }
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...'; btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/api/admin/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminEmail', data.admin.email);
                    localStorage.setItem('adminName', data.admin.name);
                    window.location.href = 'admin-dashboard.html';
                } else { errorDiv.textContent = data.error || 'Invalid credentials'; errorDiv.classList.remove('hidden'); }
            } catch (err) { errorDiv.textContent = 'Network error. Please try again.'; errorDiv.classList.remove('hidden'); }
            finally { btn.innerHTML = originalText; btn.disabled = false; }
        });
        if (localStorage.getItem('adminToken')) { window.location.href = 'admin-dashboard.html'; }
    </script>
</body>
</html>
